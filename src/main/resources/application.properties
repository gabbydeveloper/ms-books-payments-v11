#DEFINICION DE LA ZONA HORARIA DEL PAIS DE DONDE ES EL SISTEMA PARA QUE LAS FECHAS Y HORAS EN EL SISTEMA SEAN LAS CORRECTAS:
spring.jackson.time-zone=America/Bogota

#Puerto de conexion:
server.port=${PORT:8081}

#Conexion a la BDD
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://trolley.proxy.rlwy.net:39911/railway?useSSL=false&serverTimezone=America/Bogota&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=bbdcEsnQnmNBOViIyispfYeDCDcJBXIM

#Dialecto de Hibernate para MySQL:
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

#Evita inicializacion automotica de scripts SQL:
spring.sql.init.mode=never

#Pruebas de log para verificar la salida de registros:
spring.datasource.log-slow-queries=true
spring.jpa.show-sql=true

#Consultas durante la renderizacion:
spring.jpa.open-in-view=true

#Ajuste de memoria del backend:
#spring.main.jvmargs=-Xms512m -Xmx6144m

#CONFIGURACION DE EUREKA CLIENT:
#Nombre del microservicio (se usara para identificarlo en Eureka):
spring.application.name=payments-service
#URL del servidor Eureka donde se registrara este microservicio:
#eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.service-url.defaultZone=https://eureka-server-relatospapelv11-production.up.railway.app/eureka/
#Habilitar registro en Eureka:
eureka.client.register-with-eureka=true
#Habilitar busqueda de otros servicios en Eureka:
eureka.client.fetch-registry=true
#Preferir usar IP en lugar de hostname:
eureka.instance.prefer-ip-address=false
eureka.instance.hostname=${RAILWAY_PUBLIC_DOMAIN:localhost}
eureka.instance.non-secure-port=443
eureka.instance.secure-port-enabled=true
eureka.instance.non-secure-port-enabled=false
eureka.instance.lease-renewal-interval-in-seconds=10
eureka.instance.lease-expiration-duration-in-seconds=20

logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping=TRACE

server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-exception=true
server.error.include-stacktrace=always